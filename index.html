<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-MOJI | HUD</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500&display=swap" rel="stylesheet">
<body>

    <div id="landing-page">
        <div id="activate-token">
        <span class="glass-text">E-MOJI™</span>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <video class="input_video" style="display:none" playsinline></video>
        <canvas class="output_canvas"></canvas>

        <div id="ui-container">
            <header id="header">
                <h1>E-MOJI™</h1>
                
                <div id="ai-status-bubble">
                    <div id="emoji-preview">✨</div>
                    <div class="vr-divider"></div>
                    <div class="status-text">
                        <span id="category-display">CATEGORY: INITIALIZING</span>
                    </div>
                </div>
            </header>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
